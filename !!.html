<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Открытка</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #2a0033, #0d0014);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      padding: 35px;
      border-radius: 25px;
      backdrop-filter: blur(15px);
      box-shadow: 0 0 40px rgba(255, 0, 150, 0.5);
      max-width: 420px;
      position: relative;
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      min-height: 60px;
    }

    .heart {
      font-size: 45px;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    button {
      margin-top: 20px;
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg, #ff4da6, #b300ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 15px #ff4da6;
    }

    /* плавающие сердечки */
    .floating-heart {
      position: absolute;
      bottom: -20px;
      font-size: 20px;
      animation: floatUp 6s linear infinite;
      opacity: 0.6;
    }

    @keyframes floatUp {
      from { transform: translateY(0); opacity: 0.6; }
      to { transform: translateY(-110vh); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="heart">❤️</div>
    <h1>сикс севен</h1>
    <p id="text">для любимости  (флиртность)</p>
    <button onclick="changeText()">тапай хомякаа</button>
  </div>

  <script>
    const messages = [
      "и если ты растаешь я зажгу снова пожар♨️",
      "случайно потеяешь обойду весь земной шар🌏",
      "U are very pretty 💜",
      "Если я буду Джо ты будешь моей Лав? ",
      "Внезапно если будет больно - я приму любой удар💥",
      "Всегда держать тебя за руку выживу в любой кошмар☠️",
      "С тобой снова живой и в груди горят огни🔥",
      "И звёзды нам напомнят, почему мы не одни🌟",
      "ты прекрасна так же как и шафл"
    ];

    function changeText() {
      const random = Math.floor(Math.random() * messages.length);
      document.getElementById("text").innerText = messages[random];
      createHeart();
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "floating-heart";
      heart.innerText = "💜";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (15 + Math.random() * 20) + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }
  </script>
</body>
</html>
